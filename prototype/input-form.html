<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Expense | Budget Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f8ff;
color:#333;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:700;
color:#2563eb;
}

.logo span{
color:#111;
}

nav a{
text-decoration:none;
margin:0 15px;
color:#444;
font-weight:500;
}

nav a:hover{
color:#2563eb;
}

.btn{
padding:10px 22px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
width:90%;
max-width:700px;
margin:50px auto;
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.container h1{
text-align:center;
margin-bottom:10px;
color:#2563eb;
}

.container p{
text-align:center;
color:#666;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-group input,
.input-group select,
.input-group textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

textarea{
height:120px;
resize:none;
}

.buttons{
display:flex;
gap:15px;
margin-top:25px;
}

.save{
flex:1;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.reset{
flex:1;
padding:14px;
background:#e5e7eb;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.message{
margin-top:20px;
padding:12px;
border-radius:8px;
display:none;
font-weight:600;
}

.success{
background:#dcfce7;
color:#166534;
}

.error{
background:#fee2e2;
color:#991b1b;
}

footer{
margin-top:50px;
background:#fff;
text-align:center;
padding:20px;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:15px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.buttons{
flex-direction:column;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
💰 Budget<span>Tracker</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="input-form.html">Add Expense</a>
<a href="record-list.html">Records</a>
<a href="dashboard.html">Dashboard</a>
<a href="admin-view.html">Admin</a>
</nav>

<button class="btn">
My Budget
</button>

</header>

<div class="container">

<h1>Add New Expense</h1>

<p>Record your daily expenses and keep track of your spending.</p>

<form id="expenseForm">

<div class="input-group">
<label>Expense Title</label>
<input
type="text"
id="title"
placeholder="Example: Lunch"
required>
</div>

<div class="input-group">
<label>Category</label>
<select id="category" required>
<option value="">Select Category</option>
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Education</option>
<option>Entertainment</option>
<option>Health</option>
<option>Others</option>
</select>
</div>

<div class="input-group">
<label>Amount ($)</label>
<input
type="number"
id="amount"
placeholder="Enter Amount"
required>
</div>

<div class="input-group">
<label>Date</label>
<input
type="date"
id="date"
required>
</div>

<div class="input-group">
<label>Payment Method</label>
<select id="payment" required>
<option value="">Select Payment</option>
<option>Cash</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Mobile Banking</option>
<option>E-Wallet</option>
</select>
</div>

<div class="input-group">
<label>Description</label>
<textarea
id="description"
placeholder="Write something..."
required></textarea>
</div>

<div class="buttons">

<button
type="submit"
class="save">
Save Expense
</button>

<button
type="reset"
class="reset">
Clear
</button>

</div>

<div id="message" class="message"></div>

</form>

</div>

<footer>

© 2026 Budget Tracker | ICT105 Project

</footer>

<script>

const form = document.getElementById("expenseForm");
const message = document.getElementById("message");

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

form.addEventListener("submit", function(e){

    e.preventDefault();

    const title = document.getElementById("title").value.trim();
    const category = document.getElementById("category").value;
    const amount = document.getElementById("amount").value;
    const date = document.getElementById("date").value;
    const payment = document.getElementById("payment").value;
    const description = document.getElementById("description").value.trim();

    if(
        title === "" ||
        category === "" ||
        amount === "" ||
        date === "" ||
        payment === "" ||
        description === ""
    ){

        message.style.display = "block";
        message.className = "message error";
        message.innerHTML = "Please complete all required fields.";

        return;
    }

    const expense = {

        id: Date.now(),

        title: title,

        category: category,

        amount: amount,

        date: date,

        payment: payment,

        description: description,

        status: "Completed"

    };

    expenses.push(expense);

    localStorage.setItem("expenses", JSON.stringify(expenses));

    message.style.display = "block";
    message.className = "message success";
    message.innerHTML = "Expense added successfully!";

    form.reset();

});

</script>
</body>
</html>
