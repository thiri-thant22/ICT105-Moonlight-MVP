<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Records | Budget Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f8ff;
color:#333;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
font-size:30px;
font-weight:700;
color:#2563eb;
}

.logo span{
color:#111;
}

nav a{
text-decoration:none;
margin:0 15px;
color:#444;
font-weight:500;
}

nav a:hover{
color:#2563eb;
}

.btn{
padding:10px 22px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
width:92%;
margin:40px auto;
}

h1{
color:#2563eb;
margin-bottom:25px;
}

.top-bar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:15px;
margin-bottom:20px;
}

input,select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
box-shadow:0 5px 15px rgba(0,0,0,.08);
border-radius:10px;
overflow:hidden;
}

th{
background:#2563eb;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #eee;
}

.status{
background:#22c55e;
color:white;
padding:5px 12px;
border-radius:20px;
font-size:13px;
}

.action-btn{
padding:7px 12px;
margin:2px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.view{
background:#2563eb;
}

.delete{
background:#ef4444;
}

footer{
margin-top:40px;
background:white;
text-align:center;
padding:20px;
}

@media(max-width:900px){

table{
display:block;
overflow-x:auto;
}

.top-bar{
flex-direction:column;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
💰 Budget<span>Tracker</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="input-form.html">Add Expense</a>
<a href="record-list.html">Records</a>
<a href="dashboard.html">Dashboard</a>
<a href="admin-view.html">Admin</a>
</nav>

<button class="btn">Records</button>

</header>

<div class="container">

<h1>Expense Records</h1>

<div class="top-bar">

<input
type="text"
id="search"
placeholder="Search title...">

<select id="filter">

<option value="All">All Categories</option>
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Education</option>
<option>Entertainment</option>
<option>Health</option>
<option>Others</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Title</th>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
<th>Payment</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="expenseTable">

</tbody>

</table>

</div>

<footer>

© 2026 Budget Tracker | ICT105 Project

</footer>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

const table = document.getElementById("expenseTable");
const search = document.getElementById("search");
const filter = document.getElementById("filter");

function displayExpenses(list){

    table.innerHTML = "";

    if(list.length === 0){

        table.innerHTML = `
        <tr>
            <td colspan="7">No expense records found.</td>
        </tr>
        `;

        return;
    }

    list.forEach((expense,index)=>{

        table.innerHTML += `
        <tr>

            <td>${expense.title}</td>

            <td>${expense.category}</td>

            <td>$${expense.amount}</td>

            <td>${expense.date}</td>

            <td>${expense.payment}</td>

            <td>
                <span class="status">
                ${expense.status}
                </span>
            </td>

            <td>

                <button
                class="action-btn view"
                onclick="viewExpense(${expense.id})">
                View
                </button>

                <button
                class="action-btn delete"
                onclick="deleteExpense(${index})">
                Delete
                </button>

            </td>

        </tr>
        `;

    });

}

displayExpenses(expenses);

function deleteExpense(index){

    if(confirm("Delete this expense?")){

        expenses.splice(index,1);

        localStorage.setItem(
        "expenses",
        JSON.stringify(expenses)
        );

        displayExpenses(expenses);

    }

}

function viewExpense(id){

    localStorage.setItem(
    "selectedExpense",
    id
    );

    window.location.href="detail-view.html";

}

search.addEventListener("keyup",filterData);

filter.addEventListener("change",filterData);

function filterData(){

    let keyword = search.value.toLowerCase();

    let category = filter.value;

    let result = expenses.filter(expense=>{

        let matchTitle =
        expense.title.toLowerCase().includes(keyword);

        let matchCategory =
        category==="All" ||
        expense.category===category;

        return matchTitle && matchCategory;

    });

    displayExpenses(result);

}

</script>

</body>
</html>
